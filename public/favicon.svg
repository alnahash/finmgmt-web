  <g transform="translate(128, 128)">
    <!-- Vertical line of dollar sign -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="white" stroke-width="16" stroke-linecap="round"/>

    <!-- Top curve -->
    <path d="M -35 -30 Q -50 -40 -50 -60 Q -50 -85 -25 -95 Q 0 -100 25 -90 Q 50 -80 50 -60"
